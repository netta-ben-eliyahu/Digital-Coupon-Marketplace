<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Coupon Marketplace</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 1rem; }
    .row { display: flex; gap: 0.5rem; margin: 0.5rem 0; flex-wrap: wrap; }
    input, button, select { padding: 0.5rem; }
    .card { border: 1px solid #ddd; padding: 0.75rem; margin: 0.5rem 0; border-radius: 8px; }
    pre { background: #f7f7f7; padding: 0.75rem; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Digital Coupon Marketplace</h1>

  <h2>Customer</h2>
  <div class="row">
    <button onclick="loadCustomerProducts()">Load Products</button>
  </div>
  <div id="customer-products"></div>

  <h2>Admin - Create Coupon</h2>
  <div class="row"><input id="admin-token" placeholder="Admin Bearer Token" /></div>
  <div class="row">
    <input id="name" placeholder="Name" />
    <input id="description" placeholder="Description" />
    <input id="image_url" placeholder="Image URL" />
  </div>
  <div class="row">
    <input id="cost_price" type="number" step="0.01" placeholder="Cost Price" />
    <input id="margin_percentage" type="number" step="0.01" placeholder="Margin %" />
    <select id="value_type">
      <option value="STRING">STRING</option>
      <option value="IMAGE">IMAGE</option>
    </select>
    <input id="value" placeholder="Coupon Value" />
    <button onclick="createCoupon()">Create</button>
  </div>

  <h2>Output</h2>
  <pre id="out"></pre>

  <script>
    const API = "http://localhost:8000";

    function show(data) {
      document.getElementById("out").textContent = JSON.stringify(data, null, 2);
    }

    async function loadCustomerProducts() {
      const res = await fetch(`${API}/api/v1/customer/products`);
      const data = await res.json();
      const root = document.getElementById("customer-products");
      root.innerHTML = "";
      data.forEach(p => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <b>${p.name}</b><br/>
          ${p.description || ""}<br/>
          Price: ${p.price}<br/>
          <button data-id="${p.id}">Buy</button>
        `;
        div.querySelector("button").onclick = async () => {
          const r = await fetch(`${API}/api/v1/customer/products/${p.id}/purchase`, { method: "POST" });
          show(await r.json());
          loadCustomerProducts();
        };
        root.appendChild(div);
      });
    }

    async function createCoupon() {
      const token = document.getElementById("admin-token").value;
      const body = {
        name: document.getElementById("name").value,
        description: document.getElementById("description").value,
        image_url: document.getElementById("image_url").value,
        cost_price: Number(document.getElementById("cost_price").value),
        margin_percentage: Number(document.getElementById("margin_percentage").value),
        value_type: document.getElementById("value_type").value,
        value: document.getElementById("value").value
      };

      const res = await fetch(`${API}/api/v1/admin/coupons`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify(body)
      });

      show(await res.json());
    }
  </script>
</body>
</html>
